# This workflow will build a golang project
# For more information see: https://docs.github.com/en/actions/automating-builds-and-tests/building-and-testing-go
# https://github.com/actions/starter-workflows/tree/main/ci

name: Go

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:

  build:
    runs-on: ubuntu-latest
    
    services:
      mongo:
        image: mongo:7
        ports:
          - 27017:27017
  
    steps:
    - uses: actions/checkout@v4

    - name: Set up Go
      uses: actions/setup-go@v4
      with:
        go-version-file: 'backend-go/go.mod'

    - name: Build
      run: pwd && cd backend-go && go build -v ./...

    - name: Test
      run: cd backend-go && go test -v ./...
      env:
        HANDOFF_JWT_SECRET: test-test-test-test-JWTJWTJWTJWTadwbfqifq
        HANDOFF_CONNECT_STRING: mongodb://127.0.0.1:27017/?directConnection=true